<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Portfolio — Irene's Webworks</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; padding-top: 84px; }
    body.code-mode { padding-top: 48px; }

    /* ── Main toolbar ─────────────────────────────────────────────── */
    #toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; background: #16213e; color: white; height: 48px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
    }
    #toolbar h1 { font-size: 14px; font-weight: 600; flex: 1; opacity: .9; }
    .tbtn {
      padding: 5px 12px; border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    .tbtn-ghost   { background: rgba(255,255,255,.12); color: #fff; }
    .tbtn-ghost:hover  { background: rgba(255,255,255,.22); }
    .tbtn-primary { background: #667eea; color: #fff; }
    .tbtn-primary:hover { background: #5568d4; }
    .tbtn-success { background: #2f8f5b; color: #fff; }
    .tbtn-success:hover { background: #28794d; }
    .tbtn-active  { background: rgba(102,126,234,.5); color: #fff; outline: 1px solid rgba(102,126,234,.8); }

    #viewToggle { display: flex; gap: 2px; background: rgba(0,0,0,.3); border-radius: 7px; padding: 2px; }
    #viewToggle .tbtn { border-radius: 5px; padding: 4px 10px; }

    /* ── Edit toolbar ─────────────────────────────────────────────── */
    #editToolbar {
      position: fixed; top: 48px; left: 0; right: 0; z-index: 9998;
      display: flex; align-items: center; gap: 3px;
      padding: 4px 14px; background: #1a2744;
      border-bottom: 1px solid rgba(255,255,255,.07); height: 36px;
    }
    body.code-mode #editToolbar { display: none; }
    #editToolbar button {
      padding: 3px 9px; border: none; border-radius: 4px;
      background: rgba(255,255,255,.1); color: #eaf0ff;
      font-size: 12px; font-weight: 600; cursor: pointer; line-height: 1.4;
    }
    #editToolbar button:hover { background: rgba(255,255,255,.2); }
    #editToolbar .sep { width: 1px; height: 16px; background: rgba(255,255,255,.15); margin: 0 4px; flex-shrink: 0; }

    #editStatus a {
      color: #ffd7a6;
      font-weight: 700;
      text-decoration: underline;
    }
    #editStatus a:hover { color: #ffe6bf; }

    /* ── Main layout ──────────────────────────────────────────────── */
    #editorLayout {
      display: flex;
      height: calc(100vh - 84px);
    }
    body.code-mode #editorLayout { height: calc(100vh - 48px); }

    /* Visual pane */
    #visualPane { flex: 1; min-width: 0; overflow: hidden; }
    body.code-mode #visualPane { display: none; }
    #visualFrame { width: 100%; height: 100%; border: none; display: block; }

    /* Resizable divider */
    #divider {
      width: 5px; flex-shrink: 0; background: rgba(255,255,255,.07); cursor: col-resize;
      transition: background .15s;
    }
    #divider:hover, #divider.dragging { background: #667eea; }
    body.visual-mode #divider { display: none; }
    body.code-mode   #divider { display: none; }

    /* Code pane */
    #codePane { flex: 1; min-width: 0; overflow: hidden; display: flex; flex-direction: column; }
    body.visual-mode #codePane { display: none; }
    #cmContainer { flex: 1; overflow: auto; height: 100%; background: #1e2a3a; }
    #codeTextarea {
      width: 100%;
      height: 100%;
      display: block;
      background: #1e2a3a;
      color: #c9d1e3;
      border: none;
      outline: none;
      padding: 14px 18px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 12.5px;
      line-height: 1.6;
      resize: none;
      box-sizing: border-box;
      white-space: pre;
    }
    .cm-editor { height: 100%; font-size: 12.5px; }
    .cm-scroller { overflow: auto; }

    /* ── Color panel ──────────────────────────────────────────────── */
    #colorPanel {
      width: 180px; flex-shrink: 0; background: #16213e;
      border-left: 1px solid rgba(255,255,255,.1);
      display: flex; flex-direction: column; overflow-y: auto;
      transition: width .2s, opacity .2s;
    }
    #colorPanel.hidden { width: 0; opacity: 0; overflow: hidden; pointer-events: none; }
    body.code-mode   #colorPanel { display: none; }
    body.split-mode  #colorPanel { display: none; }
    #colorPanel h2 {
      font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase;
      color: rgba(255,255,255,.45); padding: 14px 14px 8px;
    }
    .color-row { display: flex; align-items: center; gap: 8px; padding: 5px 14px; }
    .color-row label { font-size: 12px; color: rgba(234,240,255,.7); flex: 1; }
    .color-row input[type="color"] {
      width: 32px; height: 24px; border: none; border-radius: 4px;
      cursor: pointer; padding: 1px; background: none;
    }
    .drag-handle {
      color: rgba(234,240,255,.25); font-size: 13px; cursor: grab;
      user-select: none; line-height: 1; flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }
    .color-row.drag-over { outline: 2px solid rgba(102,126,234,.8); border-radius: 4px; }
    .color-row.cp-dragging { opacity: .35; }
    #colorPanel hr { border: none; border-top: 1px solid rgba(255,255,255,.08); margin: 8px 14px; }
    #colorPanel .hint { font-size: 11px; color: rgba(234,240,255,.35); padding: 4px 14px 12px; line-height: 1.5; }

    /* ── View HTML modal ──────────────────────────────────────────── */
    #htmlModal {
      display: none; position: fixed; inset: 0; z-index: 100000;
      background: rgba(0,0,0,.75); align-items: center; justify-content: center;
    }
    #htmlModal.open { display: flex; }
    #htmlModalBox {
      background: #0f1929; border: 1px solid rgba(255,255,255,.15); border-radius: 12px;
      width: min(900px, 94vw); height: 80vh; display: flex; flex-direction: column; overflow: hidden;
    }
    #htmlModalHeader {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,.1); flex-shrink: 0;
    }
    #htmlModalHeader span { font-size: 13px; font-weight: 600; color: rgba(234,240,255,.8); flex: 1; }
    #htmlModalBody { flex: 1; overflow: auto; }
    #htmlModalBody textarea {
      width: 100%; height: 100%; border: none; outline: none; resize: none;
      background: #0f1929; color: #c9d1e3;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 12.5px; line-height: 1.6; padding: 14px 18px;
    }

    #no-preview {
      display: none; position: fixed; inset: 0; background: #1a1a2e; color: white;
      align-items: center; justify-content: center; flex-direction: column; gap: 16px; font-size: 16px;
    }
  </style>
</head>
<body class="visual-mode">

  <div id="toolbar">
    <h1>Irene's Webworks — Visual Editor</h1>
    <button class="tbtn tbtn-ghost" id="btnBack">← Close Editor</button>
    <div id="viewToggle">
      <button class="tbtn tbtn-active" id="btnVisual">Visual</button>
      <button class="tbtn"             id="btnSplit">Split</button>
      <button class="tbtn"             id="btnCode">Code</button>
    </div>
    <button class="tbtn tbtn-ghost"   id="btnViewHtml">View HTML</button>
    <button class="tbtn tbtn-primary" id="btnDownload">Download HTML</button>
    <button class="tbtn tbtn-success" id="btnPublish">Publish</button>
  </div>

  <div id="editToolbar">
    <button id="etBold"      title="Bold (Ctrl+B)"><b>B</b></button>
    <button id="etItalic"    title="Italic (Ctrl+I)"><i>I</i></button>
    <button id="etUnderline" title="Underline (Ctrl+U)"><u>U</u></button>
    <span class="sep"></span>
    <button id="etLink"   title="Insert link">🔗 Link</button>
    <button id="etUnlink" title="Remove link">✂ Unlink</button>
    <span class="sep"></span>
    <button id="etUl" title="Bullet list">• List</button>
    <span class="sep"></span>
    <button id="etUndo" title="Undo (Ctrl+Z)">↩ Undo</button>
    <button id="etRedo" title="Redo (Ctrl+Y)">↪ Redo</button>
    <span style="flex:1"></span>
    <span id="editStatus" style="font-size:11px; color:rgba(234,240,255,.35); padding-right:4px;"></span>
  </div>

  <div id="editorLayout">
    <div id="visualPane">
      <iframe id="visualFrame"></iframe>
    </div>
    <div id="divider"></div>
    <div id="codePane">
      <div id="cmContainer"></div>
    </div>
    <div id="colorPanel" class="hidden">
      <h2>Colors</h2>
      <div class="color-row" draggable="true" data-slot="primary">  <span class="drag-handle">⠿</span><label>1</label><input type="color" id="cp-primary"></div>
      <div class="color-row" draggable="true" data-slot="secondary"><span class="drag-handle">⠿</span><label>2</label><input type="color" id="cp-secondary"></div>
      <div class="color-row" draggable="true" data-slot="accent">   <span class="drag-handle">⠿</span><label>3</label><input type="color" id="cp-accent"></div>
      <div class="color-row" draggable="true" data-slot="dark">     <span class="drag-handle">⠿</span><label>4</label><input type="color" id="cp-dark"></div>
      <div class="color-row" draggable="true" data-slot="light">    <span class="drag-handle">⠿</span><label>5</label><input type="color" id="cp-light"></div>
      <hr>
      <div style="padding: 4px 14px 10px;">
        <button id="btnResetColors" title="Reset the five editor colors back to the page/template defaults. This does not clear the chosen template." style="width:100%; padding:5px 0; border:none; border-radius:5px; background:rgba(255,255,255,.1); color:rgba(234,240,255,.8); font-size:11px; font-weight:600; cursor:pointer;">Reset</button>
      </div>
      <p class="hint">Changes apply live. Download to save.</p>
    </div>
  </div>

  <div id="htmlModal">
    <div id="htmlModalBox">
      <div id="htmlModalHeader">
        <span>Generated HTML</span>
        <button class="tbtn tbtn-ghost" id="btnCopyHtml">Copy</button>
        <button class="tbtn tbtn-ghost" id="btnCloseHtml">✕</button>
      </div>
      <div id="htmlModalBody">
        <textarea id="htmlModalText" spellcheck="false" readonly></textarea>
      </div>
    </div>
  </div>

  <div id="no-preview">
    <p>No portfolio found. Please generate one on Page 5 first.</p>
    <button class="tbtn tbtn-primary" onclick="window.close()">← Close</button>
  </div>

  <script>
  (function () {
    const SUPABASE_URL      = "https://ssnjjojacxalnwpbzprx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_0vuLGHGt-cvTr6UZKY4Jdw_r5768KtY";
    const supabaseClient = window.supabase?.createClient
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
      : null;
    const fullHtml = localStorage.getItem("portfolio_preview_html");

    if (!fullHtml) {
      document.getElementById("no-preview").style.display = "flex";
      document.getElementById("editorLayout").style.display = "none";
      document.getElementById("toolbar").style.display = "none";
      document.getElementById("editToolbar").style.display = "none";
      return;
    }

    // ── CSS variable extraction ────────────────────────────────────────────────
    const CSS_VAR_NAMES = ["primary", "secondary", "accent", "dark", "light"];
    const cssVarMap = {};   // slot name → CSS variable name used for live overrides
    const cssVarLabels = {}; // slot name → display label from role comment
    const cssText = (fullHtml.match(/<style[^>]*>([\s\S]*?)<\/style>/gi) || [])
      .map(s => s.replace(/<\/?style[^>]*>/gi, "")).join("\n");

    // Primary strategy: read --color-* vars ordered by /* N. RoleName — ... */ comment.
    // This handles the new naming convention (--color-canvas, --color-interactive, etc.)
    function extractCssVarsByRoleComment(text) {
      const rootMatch = text.match(/:root\s*\{([\s\S]*?)\}/);
      if (!rootMatch) return {};
      const found = [];
      const re = /(--color-[\w-]+)\s*:\s*(#[0-9a-fA-F]{3,8})[^;]*;\s*\/\*\s*(\d+)\.\s*([\w]+)/g;
      let m;
      while ((m = re.exec(rootMatch[1])) !== null)
        found.push({ varName: m[1], hex: m[2], index: parseInt(m[3]), roleWord: m[4] });
      found.sort((a, b) => a.index - b.index);
      const vars = {};
      found.forEach((cv, i) => {
        if (i < CSS_VAR_NAMES.length) {
          const slot = CSS_VAR_NAMES[i];
          vars[slot] = cv.hex;
          cssVarMap[slot] = cv.varName;
          cssVarLabels[slot] = `${cv.index}. ${cv.roleWord}`;
        }
      });
      return vars;
    }

    // Fallback strategy: match by conventional slot-name patterns.
    function extractCssVarsByName(text) {
      const allVars = {};
      for (const m of text.matchAll(/--([a-zA-Z0-9_-]+)\s*:\s*([^;}\n]+)/g))
        allVars[m[1].trim().toLowerCase()] = m[2].trim().replace(/^['"]|['"]$/g, "");
      const vars = {};
      for (const name of CSS_VAR_NAMES) {
        for (const c of [name, `${name}-color`, `color-${name}`]) {
          if (allVars[c] !== undefined) { vars[name] = allVars[c]; cssVarMap[name] = `--${c}`; break; }
        }
      }
      return vars;
    }

    function toHexColor(val) {
      if (!val) return "#000000";
      const clean = val.trim();
      if (/^#[0-9a-f]{6}$/i.test(clean)) return clean;
      if (/^#[0-9a-f]{3}$/i.test(clean)) return "#" + clean.slice(1).split("").map(c => c+c).join("");
      const el = document.createElement("div");
      el.style.color = clean; document.body.appendChild(el);
      const comp = getComputedStyle(el).color; document.body.removeChild(el);
      const m = comp.match(/\d+/g);
      if (!m || m.length < 3) return "#000000";
      return "#" + m.slice(0,3).map(n => (+n).toString(16).padStart(2,"0")).join("");
    }

    // ── State ──────────────────────────────────────────────────────────────────
    const currentColors = {};
    let currentHtml = fullHtml;
    let viewMode = "visual";
    let cmView = null; // set after CodeMirror loads
    let suppressCodeSync = false;
    let splitSyncTimer = null;

    // ── Visual iframe (srcdoc — more reliable than doc.write) ─────────────────
    const frame = document.getElementById("visualFrame");

    function loadIframe(html) {
      frame.srcdoc = html;
    }

    frame.addEventListener("load", () => {
      try {
        if (frame.contentDocument) frame.contentDocument.designMode = "on";
        applyColorOverrides();
      } catch {}
    });

    function applyColorOverrides() {
      try {
        const root = frame.contentDocument?.documentElement;
        if (!root) return;
        for (const [k, v] of Object.entries(currentColors))
          root.style.setProperty(cssVarMap[k] || `--${k}`, v);
      } catch {}
    }

    loadIframe(fullHtml);

    // ── Color panel ────────────────────────────────────────────────────────────
    const byRole = extractCssVarsByRoleComment(cssText);
    const extracted = Object.keys(byRole).length ? byRole : extractCssVarsByName(cssText);
    for (const name of CSS_VAR_NAMES) {
      const hex = extracted[name] ? toHexColor(extracted[name]) : "#000000";
      currentColors[name] = hex;
      const row = document.getElementById(`cp-${name}`)?.closest(".color-row");
      if (row) {
        const input = row.querySelector("input[type=color]");
        const label = row.querySelector("label");
        if (input) {
          input.value = hex;
          input.addEventListener("input", () => { currentColors[name] = input.value; applyColorOverrides(); });
        }
        if (label && cssVarLabels[name]) label.textContent = cssVarLabels[name];
      }
    }
    document.getElementById("colorPanel").classList.remove("hidden");

    // ── Reset colors ───────────────────────────────────────────────────────────
    // Snapshot the initial colors (extracted from the generated HTML) so Reset
    // always reverts to whatever was applied when the editor first opened.
    const initialColors = { ...currentColors };
    document.getElementById("btnResetColors").onclick = () => {
      for (const name of CSS_VAR_NAMES) {
        const hex = initialColors[name];
        if (!hex) continue;
        currentColors[name] = hex;
        const input = document.getElementById(`cp-${name}`);
        if (input) input.value = hex;
      }
      applyColorOverrides();
    };

    // ── Color row drag-to-swap ─────────────────────────────────────────────────
    (function () {
      const panel = document.getElementById("colorPanel");
      let dragSrc = null;

      panel.addEventListener("dragstart", e => {
        const row = e.target.closest(".color-row");
        if (!row) return;
        // Only allow drag from the handle
        if (!e.target.classList.contains("drag-handle")) { e.preventDefault(); return; }
        dragSrc = row;
        e.dataTransfer.effectAllowed = "move";
        setTimeout(() => row.classList.add("cp-dragging"), 0);
      });

      panel.addEventListener("dragover", e => {
        const row = e.target.closest(".color-row");
        if (!row || row === dragSrc) return;
        e.preventDefault();
        panel.querySelectorAll(".color-row").forEach(r => r.classList.remove("drag-over"));
        row.classList.add("drag-over");
      });

      panel.addEventListener("dragleave", e => {
        const row = e.target.closest(".color-row");
        if (row) row.classList.remove("drag-over");
      });

      panel.addEventListener("dragend", () => {
        panel.querySelectorAll(".color-row").forEach(r => r.classList.remove("drag-over", "cp-dragging"));
        dragSrc = null;
      });

      panel.addEventListener("drop", e => {
        e.preventDefault();
        const target = e.target.closest(".color-row");
        if (!target || target === dragSrc || !dragSrc) return;

        // Swap hex values between the two slots (keeps CSS var mapping intact)
        const slotA = dragSrc.dataset.slot;
        const slotB = target.dataset.slot;
        const hexA  = currentColors[slotA];
        const hexB  = currentColors[slotB];
        currentColors[slotA] = hexB;
        currentColors[slotB] = hexA;
        const inputA = dragSrc.querySelector("input[type=color]");
        const inputB = target.querySelector("input[type=color]");
        if (inputA) inputA.value = hexB;
        if (inputB) inputB.value = hexA;

        // Swap DOM positions so the row visually moves
        const parent  = panel;
        const afterSrc = dragSrc.nextSibling;
        const afterTgt = target.nextSibling;
        if (afterSrc === target) {
          parent.insertBefore(target, dragSrc);
        } else if (afterTgt === dragSrc) {
          parent.insertBefore(dragSrc, target);
        } else {
          parent.insertBefore(dragSrc, afterTgt);
          parent.insertBefore(target, afterSrc);
        }

        // Renumber labels 1–5 top to bottom
        panel.querySelectorAll(".color-row").forEach((r, i) => {
          const lbl = r.querySelector("label");
          if (lbl) lbl.textContent = String(i + 1);
        });

        target.classList.remove("drag-over");
        applyColorOverrides();
      });
    })();

    // ── Resizable divider ──────────────────────────────────────────────────────
    const dividerEl = document.getElementById("divider");
    dividerEl.addEventListener("mousedown", e => {
      e.preventDefault(); dividerEl.classList.add("dragging");
      const startX = e.clientX, startW = document.getElementById("visualPane").offsetWidth;
      const totalW = document.getElementById("editorLayout").offsetWidth;
      const onMove = e => {
        const w = Math.max(150, Math.min(totalW - 200, startW + e.clientX - startX));
        document.getElementById("visualPane").style.cssText += ";flex:none;width:" + w + "px";
      };
      const onUp = () => { dividerEl.classList.remove("dragging"); document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });

    // ── Sync helpers ───────────────────────────────────────────────────────────
    function getVisualContent() {
      try {
        return frame.contentDocument?.documentElement?.outerHTML || currentHtml;
      } catch {
        return currentHtml;
      }
    }

    function getCodeContent() {
      if (cmView) return cmView.state.doc.toString();
      return document.getElementById("codeTextarea")?.value || currentHtml;
    }

    function setCodeContent(html) {
      if (cmView) {
        suppressCodeSync = true;
        cmView.dispatch({ changes: { from: 0, to: cmView.state.doc.length, insert: html } });
        suppressCodeSync = false;
      } else {
        const ta = document.getElementById("codeTextarea");
        if (ta) ta.value = html;
      }
    }

    function syncVisualToCode() {
      currentHtml = getVisualContent();
      setCodeContent(currentHtml);
    }

    function syncCodeToVisual() {
      const html = getCodeContent();
      currentHtml = html;
      loadIframe(html);
    }

    function scheduleSplitPreviewSync() {
      if (splitSyncTimer) clearTimeout(splitSyncTimer);
      splitSyncTimer = setTimeout(() => {
        splitSyncTimer = null;
        if (viewMode === "split") syncCodeToVisual();
      }, 180);
    }

    function handleCodeInput() {
      if (suppressCodeSync) return;
      currentHtml = getCodeContent();
      if (viewMode === "split") scheduleSplitPreviewSync();
    }

    // ── View mode ──────────────────────────────────────────────────────────────
    function setViewMode(mode) {
      if (mode !== "code"   && viewMode === "code")   syncCodeToVisual();
      if (mode !== "visual" && viewMode === "visual") syncVisualToCode();
      if (mode === "split") syncCodeToVisual();
      viewMode = mode;
      document.body.className = mode + "-mode";
      document.getElementById("btnVisual").className = "tbtn" + (mode === "visual" ? " tbtn-active" : "");
      document.getElementById("btnSplit").className  = "tbtn" + (mode === "split"  ? " tbtn-active" : "");
      document.getElementById("btnCode").className   = "tbtn" + (mode === "code"   ? " tbtn-active" : "");
      document.getElementById("colorPanel").classList.toggle("hidden", mode !== "visual");
      // Create CodeMirror only now that the pane is visible (lazy init avoids zero-height measurement)
      if (mode !== "visual") ensureCmView();
    }

    document.getElementById("btnVisual").onclick = () => setViewMode("visual");
    document.getElementById("btnSplit").onclick  = () => setViewMode("split");
    document.getElementById("btnCode").onclick   = () => setViewMode("code");

    // ── execCommand toolbar ────────────────────────────────────────────────────
    function exec(cmd, val = null) {
      try { frame.contentDocument.execCommand(cmd, false, val); frame.contentWindow.focus(); } catch {}
    }
    document.getElementById("etBold").onclick      = () => exec("bold");
    document.getElementById("etItalic").onclick    = () => exec("italic");
    document.getElementById("etUnderline").onclick = () => exec("underline");
    document.getElementById("etUndo").onclick      = () => exec("undo");
    document.getElementById("etRedo").onclick      = () => exec("redo");
    document.getElementById("etUl").onclick        = () => exec("insertUnorderedList");
    document.getElementById("etLink").onclick      = () => { const url = prompt("URL:", "https://"); if (url) exec("createLink", url); };
    document.getElementById("etUnlink").onclick    = () => exec("unlink");

    // ── Build final HTML ───────────────────────────────────────────────────────
    function buildHtmlString() {
      let html;
      if (viewMode === "code" || viewMode === "split") {
        html = getCodeContent();
      } else {
        html = getVisualContent();
      }
      const overrides = Object.entries(currentColors).map(([k, v]) => `${cssVarMap[k] || "--"+k}:${v};`).join(" ");
      if (overrides) html = html.replace("</head>", `<style>:root{${overrides}}</style>\n</head>`);
      return html;
    }

    function setEditStatus(message, kind = "") {
      const el = document.getElementById("editStatus");
      if (!el) return;
      el.textContent = message || "";
      el.style.color =
        kind === "error" ? "rgba(255,166,166,.88)" :
        kind === "ok" ? "rgba(170,240,190,.88)" :
        "rgba(234,240,255,.55)";
    }

    function setEditStatusHtml(message, kind = "") {
      const el = document.getElementById("editStatus");
      if (!el) return;
      el.innerHTML = message || "";
      el.style.color =
        kind === "error" ? "rgba(255,166,166,.88)" :
        kind === "ok" ? "rgba(170,240,190,.88)" :
        "rgba(234,240,255,.55)";
    }

    function upgradeLinkedMessage(message) {
      const text = String(message || "");
      if (!/\bupgrade\b/i.test(text)) return text;
      return text.replace(/\bupgrade\b/i, '<a href="subscriptions.html" target="_blank" rel="noopener">UPGRADE</a>');
    }

    function showLinkedError(message) {
      const linked = upgradeLinkedMessage(message);
      if (linked !== String(message || "")) {
        setEditStatusHtml(linked, "error");
      } else {
        setEditStatus(message || "Action failed.", "error");
      }
    }

    async function getMembership() {
      if (!supabaseClient) return null;
      const { data: { session } } = await supabaseClient.auth.getSession();
      const userId = session?.user?.id || null;
      if (!userId) return null;
      const { data } = await supabaseClient
        .from("memberships")
        .select("downloads_used, downloads_limit, status")
        .eq("user_id", userId)
        .single();
      return data || null;
    }

    async function ensureDownloadAllowed(actionLabel) {
      if (!supabaseClient) {
        throw new Error(`${actionLabel} is unavailable because the Supabase client failed to load.`);
      }
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session?.access_token) {
        throw new Error(`Sign in first. ${actionLabel} requires an authenticated account.`);
      }
      const membership = await getMembership();
      if (!membership) {
        throw new Error("No active membership record found for this account.");
      }
      if (membership.status !== "active") {
        throw new Error(`Membership is ${membership.status}. ${actionLabel} is disabled.`);
      }
      if (membership.downloads_limit !== -1 && membership.downloads_used >= membership.downloads_limit) {
        throw new Error("Please UPGRADE to publish or download with this account.");
      }
      return membership;
    }

    // ── View HTML modal ────────────────────────────────────────────────────────
    document.getElementById("btnViewHtml").onclick = () => {
      document.getElementById("htmlModalText").value = buildHtmlString();
      document.getElementById("htmlModal").classList.add("open");
    };
    document.getElementById("btnCloseHtml").onclick = () => document.getElementById("htmlModal").classList.remove("open");
    document.getElementById("htmlModal").addEventListener("click", e => { if (e.target === document.getElementById("htmlModal")) document.getElementById("htmlModal").classList.remove("open"); });
    document.getElementById("btnCopyHtml").onclick = () => {
      const btn = document.getElementById("btnCopyHtml");
      navigator.clipboard.writeText(document.getElementById("htmlModalText").value).then(() => { btn.textContent = "Copied!"; setTimeout(() => btn.textContent = "Copy", 1800); });
    };

    // ── Download ───────────────────────────────────────────────────────────────
    document.getElementById("btnDownload").onclick = async () => {
      try {
        setEditStatus("Checking download access...");
        await ensureDownloadAllowed("Download");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([buildHtmlString()], { type: "text/html;charset=utf-8" }));
        a.download = "portfolio.html";
        a.click();
        URL.revokeObjectURL(a.href);
        setEditStatus("Downloaded.", "ok");
      } catch (err) {
        console.error("Download failed:", err);
        showLinkedError(err?.message || "Download failed.");
      }
    };

    document.getElementById("btnPublish").onclick = async () => {
      if (!supabaseClient) {
        alert("Supabase client failed to load. Publish is unavailable.");
        return;
      }

      setEditStatus("Publishing...");
      const publishBtn = document.getElementById("btnPublish");
      const originalLabel = publishBtn.textContent;
      publishBtn.disabled = true;

      try {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session?.access_token) {
          throw new Error("Sign in first. Publish requires an authenticated account.");
        }

        const storedSlug = (localStorage.getItem("portfolio_publish_slug") || "").trim();
        const res = await fetch("/.netlify/functions/publishPortfolio", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            authorization: `Bearer ${session.access_token}`
          },
          body: JSON.stringify({
            html: buildHtmlString(),
            slug: storedSlug || undefined
          })
        });

        const payload = await res.json().catch(() => ({}));
        if (!res.ok) {
          throw new Error(payload?.error || `Publish failed (${res.status})`);
        }

        if (payload.slug) localStorage.setItem("portfolio_publish_slug", payload.slug);
        if (payload.url) localStorage.setItem("portfolio_publish_url", payload.url);

        setEditStatus(payload.republished ? "Republished." : "Published.", "ok");
        const openNow = confirm(`${payload.republished ? "Republished" : "Published"} successfully.\n\n${payload.url}\n\nOpen the published page now?`);
        if (openNow && payload.url) window.open(payload.url, "_blank", "noopener");
      } catch (err) {
        console.error("Publish failed:", err);
        showLinkedError(err?.message || "Publish failed.");
        if (!/\bupgrade\b/i.test(String(err?.message || ""))) {
          alert(err?.message || "Publish failed.");
        }
      } finally {
        publishBtn.disabled = false;
        publishBtn.textContent = originalLabel;
      }
    };

    // ── Back ───────────────────────────────────────────────────────────────────
    document.getElementById("btnBack").onclick = () => {
      if (window.opener && !window.opener.closed) {
        window.close(); // closes editor tab; form tab comes back into view
      } else {
        window.location.href = "/";
      }
    };

    // ── Live update from form window ───────────────────────────────────────────
    window.addEventListener("message", e => {
      if (e.data?.type !== "portfolio_html" || !e.data.html) return;
      currentHtml = e.data.html;
      localStorage.setItem("portfolio_preview_html", e.data.html);
      loadIframe(e.data.html);
      setCodeContent(e.data.html);
    });

    // ── Load CodeMirror from CDN (optional enhancement — plain textarea fallback) ──
    const cmContainer = document.getElementById("cmContainer");
    const ta = document.createElement("textarea");
    ta.id = "codeTextarea";
    ta.value = currentHtml;
    ta.spellcheck = false;
    ta.addEventListener("input", handleCodeInput);
    cmContainer.appendChild(ta);

    // Store modules once loaded; create EditorView lazily when pane first becomes visible.
    let cmModules = null;
    import("https://esm.sh/codemirror@6").then(({ EditorView, basicSetup }) =>
      Promise.all([
        import("https://esm.sh/@codemirror/lang-html"),
        import("https://esm.sh/@codemirror/theme-one-dark")
      ]).then(([{ html: htmlLang }, { oneDark }]) => {
        cmModules = { EditorView, basicSetup, htmlLang, oneDark };
      })
    ).catch(() => {}); // textarea stays if CDN fails

    function ensureCmView() {
      if (cmView || !cmModules) return;
      const fallback = document.getElementById("codeTextarea");
      const content = fallback?.value ?? currentHtml;
      const host = document.createElement("div");
      cmContainer.appendChild(host);
      try {
        cmView = new cmModules.EditorView({
          doc: content,
          extensions: [
            cmModules.basicSetup,
            cmModules.htmlLang(),
            cmModules.oneDark,
            cmModules.EditorView.updateListener.of(update => {
              if (update.docChanged) handleCodeInput();
            })
          ],
          parent: host
        });
        fallback?.remove();
      } catch (err) {
        host.remove();
        console.error("Failed to initialize code editor; leaving textarea fallback in place.", err);
      }
    }
  })();
  </script>
</body>
</html>

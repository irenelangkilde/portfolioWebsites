<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Purchase Confirmed — Irene's Webworks</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root{
      --bg:#0b1220;
      --panel:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.14);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.72);
      --accent:#8DE0FF;
      --primary:#4E70F1;
      --danger:#FBAB9C;
      --ok:#76b022;
      --gold:#c9a227;
      --radius:14px;
      --shadow:0 10px 26px rgba(0,0,0,.35);
      --font:ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{ box-sizing:border-box; }
    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      font-family:var(--font);
      background:
        radial-gradient(900px 520px at 15%   0%, color-mix(in oklab, var(--primary) 22%, transparent), transparent 60%),
        radial-gradient(900px 520px at 85%   0%, color-mix(in oklab, var(--danger)  18%, transparent), transparent 60%),
        radial-gradient(900px 520px at 50% 100%, color-mix(in oklab, var(--accent)  14%, transparent), transparent 60%),
        var(--bg);
      color:var(--text);
      line-height:1.55;
      min-height:100dvh;
      display:flex;
      flex-direction:column;
    }

    a{ color:var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .wrap{ max-width:680px; margin:0 auto; padding:18px 14px 56px; flex:1; }

    /* ── Header ───────────────────────────────── */
    .site-header{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:16px;
      align-items:center;
      background:linear-gradient(180deg, rgba(255,255,255,.06), transparent 55%), var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px 18px;
      position:sticky;
      top:14px;
      z-index:10;
      backdrop-filter:blur(8px);
    }
    .brand h1{ margin:0; font-size:22px; font-weight:900; letter-spacing:.2px; }
    .brand p{ margin:4px 0 0; color:var(--muted); font-size:13.5px; }

    /* ── Buttons ──────────────────────────────── */
    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:44px;
      padding:10px 18px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.1);
      color:var(--text);
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      transition:transform .18s ease, border-color .18s ease, background .18s ease;
      font-size:14px;
    }
    .btn:hover{ text-decoration:none; transform:translateY(-1px); }
    .btn.primary{
      background:color-mix(in oklab, var(--primary) 45%, rgba(255,255,255,.08));
      border-color:color-mix(in oklab, var(--primary) 70%, rgba(255,255,255,.14));
    }
    .btn.ghost{ background:rgba(0,0,0,.15); }

    /* ── Card ─────────────────────────────────── */
    .card{
      background:rgba(255,255,255,.07);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:36px 32px;
      text-align:center;
    }

    /* ── Tier badge ───────────────────────────── */
    .tier-badge{
      display:inline-block;
      padding:4px 12px;
      border-radius:999px;
      font-size:11px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:16px;
      background:color-mix(in oklab, var(--primary) 22%, rgba(255,255,255,.05));
      border:1px solid color-mix(in oklab, var(--primary) 45%, rgba(255,255,255,.1));
      color:color-mix(in oklab, var(--accent) 80%, white);
    }
    .tier-badge.care{
      background:color-mix(in oklab, var(--gold) 18%, rgba(255,255,255,.04));
      border-color:color-mix(in oklab, var(--gold) 40%, rgba(255,255,255,.1));
      color:color-mix(in oklab, var(--gold) 85%, white);
    }

    /* ── Success icon ─────────────────────────── */
    .success-ring{
      width:80px; height:80px;
      border-radius:50%;
      background:color-mix(in oklab, var(--ok) 18%, rgba(255,255,255,.04));
      border:2px solid color-mix(in oklab, var(--ok) 55%, rgba(255,255,255,.14));
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 20px;
      font-size:36px;
      box-shadow:0 0 32px color-mix(in oklab, var(--ok) 28%, transparent);
    }

    h2{
      margin:0 0 12px;
      font-size:clamp(1.6rem, 4vw, 2.4rem);
      font-weight:900;
      line-height:1.1;
      letter-spacing:-.03em;
    }

    .subhead{
      margin:0 auto 28px;
      font-size:16px;
      color:var(--muted);
      line-height:1.75;
      max-width:44ch;
    }

    /* ── Includes list ────────────────────────── */
    .includes{
      background:rgba(0,0,0,.2);
      border:1px solid rgba(255,255,255,.08);
      border-radius:10px;
      padding:18px 20px;
      text-align:left;
      margin:0 0 20px;
    }
    .includes p{
      margin:0 0 10px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:rgba(234,240,255,.45);
    }
    .includes ul{
      margin:0; padding:0;
      list-style:none;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .includes li{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:14.5px;
      color:var(--muted);
    }
    .includes li::before{
      content:"✓";
      flex-shrink:0;
      width:20px; height:20px;
      border-radius:50%;
      background:color-mix(in oklab, var(--ok) 22%, rgba(255,255,255,.04));
      border:1px solid color-mix(in oklab, var(--ok) 45%, rgba(255,255,255,.1));
      color:color-mix(in oklab, var(--ok) 80%, white);
      font-size:11px;
      font-weight:900;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    /* ── Next-steps note ──────────────────────── */
    .next-steps{
      background:color-mix(in oklab, var(--primary) 12%, rgba(255,255,255,.03));
      border:1px solid color-mix(in oklab, var(--primary) 35%, rgba(255,255,255,.08));
      border-radius:10px;
      padding:16px 20px;
      text-align:left;
      margin:0 0 28px;
      font-size:14px;
      color:var(--muted);
      line-height:1.75;
    }
    .next-steps strong{
      display:block;
      color:var(--text);
      font-size:13px;
      font-weight:800;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin-bottom:6px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    /* ── Footer ───────────────────────────────── */
    footer{
      display:flex;
      flex-wrap:wrap;
      gap:8px 20px;
      justify-content:space-between;
      align-items:center;
      padding:14px 18px;
      font-size:12.5px;
      color:rgba(234,240,255,.4);
      border-top:1px solid rgba(255,255,255,.06);
    }
    footer a{ color:rgba(234,240,255,.45); }
    footer a:hover{ color:var(--accent); text-decoration:none; }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="c5a157d9-8e58-47b8-a009-87d582934063"></script>
</head>
<body>

<main class="wrap">

  <header class="site-header">
    <div class="brand">
      <h1>Irene's Webworks</h1>
      <p>Professional portfolio websites</p>
    </div>
    <a href="../index.html" class="btn ghost">Home</a>
  </header>

  <div style="margin-top:48px;">
    <div class="card">

      <div class="success-ring" id="successIcon">✓</div>
      <div class="tier-badge" id="tierBadge"></div>

      <h2 id="headline">You're all set!</h2>
      <p class="subhead" id="subhead"></p>

      <div class="includes" id="includesList">
        <p>What's included</p>
        <ul id="includesItems"></ul>
      </div>

      <div class="next-steps" id="nextSteps">
        <strong>What happens next</strong>
        <span id="nextStepsBody"></span>
      </div>

      <div class="actions" id="actions"></div>

    </div>
  </div>

</main>

<footer>
  <span>Irene's Webworks</span>
  <span>
    <a href="../index.html">Home</a> ·
    <a href="mailto:irene@irenes-ventures.com">Contact Irene</a> ·
    <a href="terms.html">Terms</a> ·
    <a href="privacy.html">Privacy</a>
  </span>
</footer>

<script>
  const TIERS = {
    free: {
      badge:     "Free Trial",
      icon:      "✓",
      headline:  "Your Free Trial is active.",
      subhead:   "Your account is ready. Generate a full portfolio preview — no download or deploy until you upgrade.",
      includes: [
        "3 AI generation credits",
        "Full pipeline: analysis, design, editing",
        "Preview only — no download or deploy",
        "No hosting · No renewal",
      ],
      nextSteps: "Sign in and open the intake form. Fill in your details, choose a style, and your portfolio will be generated. Ready to download or publish? Upgrade to Graduate or Prime.",
      actions: [
        { label: "Start the intake form →", href: "overview.html", cls: "primary" },
        { label: "See upgrade options",     href: "pricing.html",  cls: "ghost"   },
      ],
    },

    graduate: {
      badge:    "Graduate",
      icon:     "✓",
      headline: "Your Graduate credits are ready.",
      subhead:  "Your purchased units have been added to your account. Credits and sites scale with the number of units you bought.",
      includes: [
        "3 credits per unit purchased",
        "1 site per unit purchased",
        "Optional auto-renewal — cancel any time",
      ],
      nextSteps: "Sign in and open the intake form. Your credits and sites are available immediately. You can adjust your unit quantity or cancel auto-renewal from the Plans & Billing page.",
      actions: [
        { label: "Start the intake form →", href: "overview.html", cls: "primary" },
        { label: "Plans & Billing",         href: "pricing.html",  cls: "ghost"   },
      ],
    },

    prime: {
      badge:    "Prime",
      icon:     "✓",
      headline: "Prime — unlocked.",
      subhead:  "Your plan is active. You have 10 credits and 5 sites for the next four months.",
      includes: [
        "10 credits",
        "5 sites",
        "Hosting for four months",
        "Best per-credit price of any direct plan",
        "Trimester (4-month) billing — optional renewal",
      ],
      nextSteps: "Sign in and open the intake form. Build multiple portfolio versions — your credits and sites are ready.",
      actions: [
        { label: "Start the intake form →", href: "overview.html", cls: "primary" },
        { label: "Back to home",            href: "../index.html", cls: "ghost"   },
      ],
    },

    graduate_gift: {
      badge:    "Graduate Gift",
      icon:     "🎁",
      headline: "Your Graduate gift is on its way.",
      subhead:  "A gift certificate with the redemption code is being emailed to the recipient.",
      includes: [
        "3 AI generation credits per unit purchased",
        "1 portfolio site per unit purchased",
        "Hosting included per unit",
        "Recipient redeems the code to activate their plan",
      ],
      nextSteps: "The recipient will get an email from Irene's Webworks with their personal gift code and step-by-step instructions. They create a free account at irenes-ventures.com and redeem the code to unlock their plan.",
      actions: [
        { label: "Back to home", href: "../index.html", cls: "primary" },
      ],
    },

    prime_gift: {
      badge:    "Prime Gift",
      icon:     "🎁",
      headline: "Your Prime gift is on its way.",
      subhead:  "A gift certificate with the redemption code is being emailed to the recipient.",
      includes: [
        "10 AI generation credits",
        "5 portfolio sites",
        "4 months of hosting",
        "Recipient redeems the code to activate their plan",
      ],
      nextSteps: "The recipient will get an email from Irene's Webworks with their personal gift code and step-by-step instructions. They create a free account at irenes-ventures.com and redeem the code to unlock their plan.",
      actions: [
        { label: "Back to home", href: "../index.html", cls: "primary" },
      ],
    },

    starter_care: {
      badge:    "Starter Gift",
      icon:     "🎁",
      headline: "Your gift code is on its way.",
      subhead:  "A Starter gift code has been sent to your email. Forward it to the lucky recipient — they'll redeem it to get their portfolio site.",
      includes: [
        "10 AI generation credits",
        "2 portfolio sites",
        "6 months of hosting",
        "1 month of support",
      ],
      nextSteps: "Check your inbox for an email from Irene's Webworks with the gift code. Forward the code to the recipient and let them know they can redeem it at irenes-ventures.com.",
      actions: [
        { label: "Back to home", href: "../index.html", cls: "primary" },
      ],
    },

    premium_care: {
      badge:    "Premium Gift",
      icon:     "🎁",
      headline: "Your gift code is on its way.",
      subhead:  "A Premium gift code has been sent to your email. Forward it to the lucky recipient — they'll redeem it to get their portfolio site.",
      includes: [
        "25 AI generation credits",
        "10 portfolio sites",
        "12 months of hosting",
        "2 months of priority support",
      ],
      nextSteps: "Check your inbox for an email from Irene's Webworks with the gift code. Forward the code to the recipient and let them know they can redeem it at irenes-ventures.com.",
      actions: [
        { label: "Back to home", href: "../index.html", cls: "primary" },
      ],
    },

    care: {
      badge:     "Care Package",
      badgeCls:  "care",
      icon:      "★",
      headline:  "Your Care Package is active.",
      subhead:   "Irene will be in touch shortly to schedule your onboarding and walk through next steps together.",
      includes: [
        "Hands-on guidance before and after launch",
        "Done-for-you editing and polishing",
        "Direct access to Irene",
        "Billed monthly — cancel any time",
      ],
      nextSteps: "Keep an eye on your inbox. Irene will reach out within one business day to get started. In the meantime, feel free to begin the intake form on your own — or wait and do it together.",
      actions: [
        { label: "Start the intake form →", href: "overview.html",                    cls: "primary" },
        { label: "Email Irene",             href: "mailto:irene@irenes-ventures.com", cls: "ghost"   },
      ],
    },
  };

  const ADDON_LABELS = {
    hosting:       qty => `${qty} month${qty !== 1 ? "s" : ""} of hosting`,
    extra_credits: qty => `${qty} extra credit${qty !== 1 ? "s" : ""}`,
    care:          qty => `${qty} month${qty !== 1 ? "s" : ""} of support`,
  };

  const params  = new URLSearchParams(window.location.search);
  const tier    = params.get("tier");
  const isGift  = params.get("is_gift") === "true";
  const tierKey = isGift && (tier === "graduate" || tier === "prime") ? tier + "_gift" : tier;
  const info    = TIERS[tierKey] || TIERS[tier];

  let cartItems = [];
  try {
    const raw = params.get("cart");
    if (raw) cartItems = JSON.parse(decodeURIComponent(raw));
  } catch {}

  if (info) {
    document.getElementById("successIcon").textContent = info.icon;
    document.getElementById("tierBadge").textContent   = info.badge;
    if (info.badgeCls) document.getElementById("tierBadge").classList.add(info.badgeCls);
    document.getElementById("headline").textContent    = info.headline;
    document.getElementById("subhead").textContent     = info.subhead;
    document.getElementById("nextStepsBody").textContent = info.nextSteps;

    const ul = document.getElementById("includesItems");
    info.includes.forEach(text => {
      const li = document.createElement("li");
      li.textContent = text;
      ul.appendChild(li);
    });

    cartItems.forEach(item => {
      const labelFn = ADDON_LABELS[item.tier];
      if (!labelFn) return;
      const qty = Math.max(1, Number(item.qty) || 1);
      const li = document.createElement("li");
      li.textContent = labelFn(qty);
      ul.appendChild(li);
    });

    const actionsEl = document.getElementById("actions");
    info.actions.forEach(a => {
      const el = document.createElement("a");
      el.href = a.href;
      el.className = `btn ${a.cls}`;
      el.textContent = a.label;
      actionsEl.appendChild(el);
    });

    // Gift code display for graduate/prime gifts
    if (isGift && (tier === "graduate" || tier === "prime")) {
      const box = document.createElement("div");
      box.style.cssText = "background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:22px 20px;text-align:center;margin:0 0 20px;";
      box.innerHTML = `
        <p style="margin:0 0 10px;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(234,240,255,.45);">Gift Code</p>
        <p id="giftCodeDisplay" style="margin:0;font-size:28px;font-weight:900;letter-spacing:.1em;font-family:ui-monospace,monospace;color:rgba(234,240,255,.45);">—</p>
        <p id="giftCodeNote" style="margin:10px 0 0;font-size:13px;color:rgba(234,240,255,.45);">Generating…</p>`;
      document.getElementById("includesList").insertAdjacentElement("beforebegin", box);

      // Poll for the gift code — webhook may not have fired yet when the page loads
      (async () => {
        const sessionId = params.get("session_id");
        const note      = document.getElementById("giftCodeNote");
        if (!sessionId) {
          note.textContent = "Error: no session ID in URL.";
          return;
        }
        const MAX = 8;
        for (let attempt = 0; attempt < MAX; attempt++) {
          if (attempt > 0) await new Promise(r => setTimeout(r, 2500));
          note.textContent = `Generating… (attempt ${attempt + 1}/${MAX})`;
          let res, data;
          try {
            res  = await fetch(`/.netlify/functions/getGiftCode?sessionId=${encodeURIComponent(sessionId)}`);
            data = await res.json().catch(() => ({}));
          } catch (err) {
            note.textContent = `Network error on attempt ${attempt + 1}: ${err.message}`;
            continue;
          }
          if (res.status === 404) {
            note.textContent = `Not ready yet (attempt ${attempt + 1}/${MAX})…`;
            continue;
          }
          if (!res.ok) {
            note.textContent = `Server error ${res.status} on attempt ${attempt + 1}: ${data?.error || "unknown"}`;
            continue;
          }
          if (data.code) {
            const display = document.getElementById("giftCodeDisplay");
            display.textContent = data.code;
            display.style.color = "#fff";
            display.style.background = "rgba(255,255,255,.06)";
            display.style.border = "1px solid rgba(255,255,255,.16)";
            display.style.borderRadius = "10px";
            display.style.padding = "12px 22px";
            display.style.display = "inline-block";
            display.style.marginTop = "4px";
            note.textContent = "This code has been emailed to the recipient.";
            note.style.color = "rgba(234,240,255,.55)";
            return;
          }
          note.textContent = `Unexpected response on attempt ${attempt + 1}: ${JSON.stringify(data)}`;
        }
        note.textContent = "The gift email is on its way — check back shortly if the code doesn't appear.";
      })();
    }
  } else {
    document.getElementById("tierBadge").style.display   = "none";
    document.getElementById("includesList").style.display = "none";
    document.getElementById("nextSteps").style.display   = "none";
    document.getElementById("subhead").textContent = "Your purchase is confirmed. Sign in to see your updated account balance.";
    const actionsEl = document.getElementById("actions");
    actionsEl.innerHTML = `
      <a href="overview.html" class="btn primary">Start the intake form →</a>
      <a href="../index.html" class="btn ghost">Back to home</a>
    `;
  }

  // Provision the membership directly from the Stripe session — fallback in case
  // the webhook hasn't fired yet or isn't configured.
  (async () => {
    const sessionId = params.get("session_id");
    const tierParam  = params.get("tier");
    if (!sessionId || !tierParam || tierParam === "free" ||
        tierParam === "starter_care" || tierParam === "premium_care") return;

    const SUPABASE_URL      = "https://ssnjjojacxalnwpbzprx.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_0vuLGHGt-cvTr6UZKY4Jdw_r5768KtY";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const { data: { session } } = await sb.auth.getSession();
    if (!session?.access_token) return; // not signed in — webhook will handle it

    try {
      const res = await fetch("/.netlify/functions/provisionFromSession", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ sessionId, authToken: session.access_token }),
      });
      const data = await res.json().catch(() => ({}));
      if (data.ok) console.log("provisionFromSession:", data.alreadyProvisioned ? "already active" : `activated ${data.tier}`);
      else console.warn("provisionFromSession error:", data.error);
    } catch (err) {
      console.warn("provisionFromSession fetch failed:", err.message);
    }
  })();
</script>

</body>
</html>

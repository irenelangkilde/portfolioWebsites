<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}Irene's Webworks Blog</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}" />{% endif %}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}" />
  <link type="application/atom+xml" rel="alternate" href="{{ '/feed.xml' | relative_url }}" title="{{ site.title }}" />
</head>
<body>
<div class="wrap">

  <nav>
    <a href="/" class="nav-brand">
      <div class="nav-logo">IW</div>
      <span class="nav-title">Irene's Webworks</span>
    </a>
    <div class="nav-links">
      <a href="/#how" class="btn">How it works</a>
      <a href="/#sections" class="btn">What's included</a>
      <a href="/src/pricing.html" class="btn">Pricing</a>
      <a href="/src/landing_gift.html" class="btn">🎁 Give a gift</a>
      <a href="/src/about.html" class="btn">About</a>
      <a href="{{ '/' | relative_url }}" class="btn active">Blog</a>
      <a href="/src/overview.html" class="btn primary">Get started →</a>
    </div>
  </nav>

  {{ content }}

  <footer>
    © {{ site.time | date: '%Y' }} Irene's Ventures &nbsp;·&nbsp; Elevating careers, one website at a time.
    &nbsp;·&nbsp; <a href="mailto:{{ site.email }}">{{ site.email }}</a>
  </footer>

</div>
</body>
</html>

---
layout: default
---
<a href="{{ '/' | relative_url }}" class="back-link" style="display:inline-flex;align-items:center;gap:5px;margin-top:24px;">← Back to Blog</a>

<div class="post-header pattern-{{ page.pattern_variant | default: 1 }}">
  <div class="post-meta">{{ page.date | date: "%B %-d, %Y" }}{% if page.author %} &nbsp;·&nbsp; {{ page.author }}{% endif %}</div>
  <h1>{{ page.title }}</h1>
</div>

<div class="post-body">
  {{ content }}
</div>

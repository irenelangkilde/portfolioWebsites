[build]
  command = "cd blog && bundle exec jekyll build --destination ../blog-built"
  publish = "."
  functions = "src/netlify/functions"
  edge_functions = "netlify/edge-functions"

# Serve the Jekyll-built blog under /blog/
[[redirects]]
  from = "/blog/*"
  to = "/blog-built/:splat"
  status = 200
  force = true

[functions]
  node_bundler = "esbuild"
  directory = "src/netlify/functions"
  included_files = ["src/*.txt", "src/netlify/functions/*.md", "*.md", "templates/**"]
  external_node_modules = ["@anthropic-ai/sdk", "openai", "@supabase/supabase-js", "stripe", "playwright", "playwright-core", "chromium-bidi"]

# Edge function handles custom domain → portfolio routing
[[edge_functions]]
  function = "servePortfolio"
  path = "/*"

# Clean URLs for published portfolios
# /u/janesmith       → latest version
# /u/janesmith-1     → permanent deploy #1 snapshot
[[redirects]]
  from = "/u/:slug"
  to = "/.netlify/functions/publishedPortfolio?slug=:slug"
  status = 200




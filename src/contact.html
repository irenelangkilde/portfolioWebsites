<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contact Irene — Irene's Webworks</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.14);
      --text:#eaf0ff;
      --muted:rgba(234,240,255,.72);
      --accent:#8DE0FF;
      --primary:#4E70F1;
      --danger:#FBAB9C;
      --ok:#76b022;
      --radius:14px;
      --shadow: 0 10px 26px rgba(0,0,0,.35);
      --font: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html{ scroll-behavior:smooth; }
    body{
      font-family:var(--font);
      background:
        radial-gradient(900px 520px at 15% 0%,   color-mix(in oklab, var(--primary) 22%, transparent), transparent 60%),
        radial-gradient(900px 520px at 85% 0%,   color-mix(in oklab, var(--danger)  18%, transparent), transparent 60%),
        radial-gradient(900px 520px at 50% 100%, color-mix(in oklab, var(--accent)  14%, transparent), transparent 60%),
        var(--bg);
      color:var(--text);
      line-height:1.6;
      min-height:100vh;
    }
    a{ color:var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .wrap{ max-width:620px; margin:0 auto; padding:18px 14px 80px; }

    nav{
      background:linear-gradient(180deg, rgba(255,255,255,.06), transparent 55%), var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:10px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
    }
    .nav-brand{ display:flex; align-items:center; gap:10px; }
    .nav-logo{
      width:34px; height:34px; border-radius:10px;
      background: linear-gradient(135deg, var(--primary), color-mix(in oklab, var(--accent) 60%, var(--primary)));
      display:flex; align-items:center; justify-content:center;
      font-size:18px; font-weight:900; color:#fff;
      box-shadow:0 4px 14px rgba(78,112,241,.4);
      flex-shrink:0;
    }
    .nav-title{ font-size:17px; font-weight:900; letter-spacing:.2px; }
    .btn{
      padding:9px 14px;
      border-radius:11px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(255,255,255,.10);
      color:var(--text);
      font-weight:800;
      font-size:13.5px;
      cursor:pointer;
      text-decoration:none !important;
      display:inline-flex;
      align-items:center;
      gap:6px;
      transition:background .15s, border-color .15s;
    }
    .btn:hover{ background:rgba(255,255,255,.16); }
    .btn.primary{
      background:color-mix(in oklab, var(--primary) 45%, rgba(255,255,255,.08));
      border-color:color-mix(in oklab, var(--primary) 70%, rgba(255,255,255,.14));
    }
    .btn.primary:hover{ background:color-mix(in oklab, var(--primary) 62%, rgba(255,255,255,.08)); }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:36px 32px;
      margin-top:28px;
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:'';
      position:absolute;
      inset:0;
      background:
        radial-gradient(500px 300px at 50% -10%, color-mix(in oklab, var(--primary) 12%, transparent), transparent 70%),
        radial-gradient(400px 250px at 100% 110%, color-mix(in oklab, var(--danger) 10%, transparent), transparent 70%);
      pointer-events:none;
    }
    .card-inner{ position:relative; z-index:1; }

    h1{
      font-size:clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight:900;
      letter-spacing:-.02em;
      line-height:1.1;
      margin-bottom:10px;
    }
    .subtitle{
      color:var(--muted);
      font-size:15px;
      margin-bottom:30px;
    }

    .field{ margin-bottom:18px; }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      color:var(--muted);
      letter-spacing:.04em;
      text-transform:uppercase;
      margin-bottom:6px;
    }
    input, select, textarea{
      width:100%;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      border-radius:10px;
      padding:11px 14px;
      color:var(--text);
      font-family:var(--font);
      font-size:14.5px;
      outline:none;
      transition:border-color .15s;
      appearance:none;
    }
    input:focus, select:focus, textarea:focus{
      border-color:color-mix(in oklab, var(--accent) 60%, rgba(255,255,255,.14));
    }
    select option{ background:#0e1829; color:var(--text); }
    textarea{ resize:vertical; min-height:130px; line-height:1.6; }

    .submit-row{ margin-top:24px; }
    .btn-submit{
      width:100%;
      padding:14px 24px;
      border-radius:12px;
      border:none;
      background:color-mix(in oklab, var(--primary) 45%, rgba(255,255,255,.08));
      border:1px solid color-mix(in oklab, var(--primary) 70%, rgba(255,255,255,.14));
      color:#fff;
      font-family:var(--font);
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      transition:background .15s;
    }
    .btn-submit:hover{ background:color-mix(in oklab, var(--primary) 62%, rgba(255,255,255,.08)); }

    .success{
      display:none;
      text-align:center;
      padding:40px 20px;
    }
    .success .icon{ font-size:2.8rem; margin-bottom:14px; }
    .success h2{ font-size:1.4rem; font-weight:900; margin-bottom:8px; }
    .success p{ color:var(--muted); font-size:15px; }

    .alt-contact{
      margin-top:22px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <div class="nav-brand">
        <div class="nav-logo">W</div>
        <span class="nav-title">Irene's Webworks</span>
      </div>
      <a href="home_dark_elevate.html" class="btn">← Back</a>
    </nav>

    <div class="card">
      <div class="card-inner">
        <div id="formSection">
          <h1>Talk to Irene</h1>
          <p class="subtitle">Questions, feedback, or just want to say hi — I read every message personally.</p>

          <form name="contact" netlify data-netlify="true" netlify-honeypot="bot-field" id="contactForm">
            <input type="hidden" name="form-name" value="contact" />
            <p style="display:none;"><input name="bot-field" /></p>

            <div class="field">
              <label for="name">Your name</label>
              <input type="text" id="name" name="name" placeholder="Jane Smith" required />
            </div>

            <div class="field">
              <label for="email">Email address</label>
              <input type="email" id="email" name="email" placeholder="jane@example.com" required />
            </div>

            <div class="field">
              <label for="topic">Topic</label>
              <select id="topic" name="topic">
                <option value="general">General question</option>
                <option value="pricing">Pricing</option>
                <option value="technical">Technical issue</option>
                <option value="feedback">Feedback</option>
                <option value="other">Other</option>
              </select>
            </div>

            <div class="field">
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="What's on your mind?" required></textarea>
            </div>

            <div class="submit-row">
              <button type="submit" class="btn-submit">Send message →</button>
            </div>
          </form>

          <p class="alt-contact">Or email directly: <a href="mailto:irene@irenes-ventures.com">irene@irenes-ventures.com</a></p>
        </div>

        <div class="success" id="successMsg">
          <div class="icon">✉️</div>
          <h2>Message sent!</h2>
          <p>Thanks for reaching out. Irene will get back to you within one business day.</p>
          <div style="margin-top:24px;">
            <a href="home_dark_elevate.html" class="btn primary">← Back to Irene's Webworks</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("contactForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = e.target;
      const data = new FormData(form);
      try {
        await fetch("/", { method: "POST", body: new URLSearchParams(data) });
        document.getElementById("formSection").style.display = "none";
        document.getElementById("successMsg").style.display = "block";
      } catch {
        alert("Something went wrong. Please email irene@irenes-ventures.com directly.");
      }
    });
  </script>
</body>
</html>

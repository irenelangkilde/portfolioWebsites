<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Portfolio Gallery</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-deep: #16213e;
      --panel: rgba(24, 34, 62, 0.86);
      --panel-strong: #213055;
      --ink: #eef3ff;
      --muted: #aab6d3;
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 18px 50px rgba(5, 10, 24, 0.34);
      --shadow-strong: 0 24px 60px rgba(5, 10, 24, 0.5);
      --accent: #8ea2ff;
      --accent-2: #7ed7c1;
      --preview-width: 1440;
      --preview-height: 1024;
      --preview-scale: 0.19;
      --preview-shell-height: calc(var(--preview-height) * 1px * var(--preview-scale));
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(142, 162, 255, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(126, 215, 193, 0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: 28px;
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(22, 33, 62, 0.88);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      font-weight: 600;
      line-height: 0.95;
      letter-spacing: -0.04em;
      max-width: 10ch;
    }

    .hero-copy {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: end;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .hero-tools {
      display: grid;
      gap: 14px;
      justify-items: stretch;
    }

    .search-wrap {
      display: grid;
      gap: 8px;
    }

    .search-label,
    .count {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }

    #searchInput {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      background: rgba(10, 15, 30, 0.46);
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    #searchInput:focus {
      border-color: rgba(142, 162, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(142, 162, 255, 0.12);
      transform: translateY(-1px);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .card {
      position: relative;
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      overflow: hidden;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: auto -10% -35% auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(142, 162, 255, 0.18), transparent 70%);
      z-index: -1;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: rgba(142, 162, 255, 0.28);
      box-shadow: var(--shadow-strong);
    }

    .card:focus-visible {
      outline: 3px solid rgba(142, 162, 255, 0.22);
      outline-offset: 2px;
    }

    .preview-shell {
      position: relative;
      height: var(--preview-shell-height);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(180deg, rgba(126, 215, 193, 0.08), rgba(142, 162, 255, 0.08)),
        var(--panel-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .preview-shell::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 30px;
      background: linear-gradient(180deg, rgba(142, 162, 255, 0.18), rgba(142, 162, 255, 0.06));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 2;
    }

    .preview-shell::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 12px;
      width: 48px;
      height: 10px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 5px 5px, #d97757 0 4px, transparent 4.1px),
        radial-gradient(circle at 24px 5px, #d7a457 0 4px, transparent 4.1px),
        radial-gradient(circle at 43px 5px, #5e9f86 0 4px, transparent 4.1px);
      z-index: 3;
    }

    .preview-stage {
      position: absolute;
      top: 30px;
      left: 0;
      width: 100%;
      height: calc(100% - 30px);
      overflow: hidden;
      background: #fff;
    }

    .preview-frame {
      width: calc(var(--preview-width) * 1px);
      height: calc(var(--preview-height) * 1px);
      border: 0;
      transform: scale(var(--preview-scale));
      transform-origin: top left;
      pointer-events: none;
      background: #fff;
    }

    .preview-link {
      display: block;
      border-radius: 18px;
      text-decoration: none;
      outline: none;
    }

    .preview-link:focus-visible .preview-shell {
      border-color: rgba(142, 162, 255, 0.68);
      box-shadow:
        0 0 0 4px rgba(142, 162, 255, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .card-body {
      display: grid;
      gap: 10px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 10px 14px;
      border: 0;
      border-radius: 999px;
      background: rgba(142, 162, 255, 0.12);
      color: var(--accent);
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      background: rgba(142, 162, 255, 0.22);
      color: var(--ink);
      outline: none;
      transform: translateY(-1px);
    }

    .empty {
      display: none;
      padding: 40px 24px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      background: rgba(22, 33, 62, 0.6);
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
    }

    .empty.show {
      display: block;
    }

    body.modal-open {
      overflow: hidden;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(5, 10, 24, 0.72);
      backdrop-filter: blur(8px);
    }

    .modal-backdrop[hidden] {
      display: none;
    }

    .learn-modal {
      width: min(720px, 100%);
      max-height: min(760px, calc(100vh - 48px));
      overflow: auto;
      padding: 28px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 24px;
      background: rgba(22, 33, 62, 0.97);
      box-shadow: var(--shadow-strong);
    }

    .modal-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    .modal-kicker {
      margin: 0 0 8px;
      color: var(--accent-2);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .learn-modal h2 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      line-height: 1;
    }

    .modal-close {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }

    .modal-close:hover,
    .modal-close:focus-visible {
      background: rgba(142, 162, 255, 0.18);
      outline: none;
    }

    .modal-body {
      display: grid;
      gap: 14px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.68;
    }

    .modal-body p {
      margin: 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .modal-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 16px;
      border-radius: 999px;
      background: rgba(126, 215, 193, 0.15);
      color: var(--accent-2);
      font-size: 0.88rem;
      font-weight: 900;
      text-decoration: none;
    }

    @media (max-width: 820px) {
      .page {
        width: min(100vw - 18px, 1240px);
        padding-top: 12px;
      }

      .hero {
        position: static;
        padding: 18px;
        border-radius: 22px;
      }

      .hero-copy {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      :root {
        --preview-scale: 0.16;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 14px;
        border-radius: 20px;
      }

      .preview-shell {
        border-radius: 16px;
      }

      h1 {
        max-width: none;
      }
    }
  </style>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="c5a157d9-8e58-47b8-a009-87d582934063"></script>
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">HTML Template Gallery</p>
      <div class="hero-copy">
        <div>
          <h1>Personal Portfolio Previews</h1>
          <p>
            Browse our public portfolio variants. Each card shows a live scaled preview. Click a preview to open the full
            site, or choose Learn More for a short description.
          </p>
        </div>
        <div class="hero-tools">
          <div class="search-wrap">
            <label class="search-label" for="searchInput">Filter by major or variant</label>
            <input id="searchInput" type="search" placeholder="Try biology, biology B, electrical engineering,..." />
          </div>
          <div class="count" id="resultCount" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <section class="gallery" id="gallery" aria-label="Grad website gallery"></section>
    <div class="empty" id="emptyState">No gallery cards match that filter.</div>
  </main>

  <div class="modal-backdrop" id="learnMoreModal" hidden>
    <section class="learn-modal" role="dialog" aria-modal="true" aria-labelledby="learnMoreTitle">
      <div class="modal-top">
        <div>
          <p class="modal-kicker">Learn More</p>
          <h2 id="learnMoreTitle">Template</h2>
        </div>
        <button class="modal-close" id="learnMoreClose" type="button" aria-label="Close learn more dialog">Close</button>
      </div>
      <div class="modal-body" id="learnMoreBody"></div>
      <div class="modal-actions">
        <a class="modal-link" id="learnMoreOpenLink" href="#" target="_blank" rel="noopener noreferrer">Open Website</a>
      </div>
    </section>
  </div>

  <script>
    const files = [
      { href: "../templates/accounting/sample.html",                  major: "Accounting",                variant: "Base" },
      { href: "../templates/anthropology/sample.html",                major: "Anthropology",              variant: "Base" },
      { href: "../templates/art/sample.html",                         major: "Art",                       variant: "Base" },
      { href: "../templates/biology/sample.html",                     major: "Biology",                   variant: "Base" },
      { href: "../templates/biology-b/sample.html",                   major: "Biology",                   variant: "B"    },
      { href: "../templates/chemistry/sample.html",                   major: "Chemistry",                 variant: "Base" },
      { href: "../templates/civil-engineering/sample.html",           major: "Civil Engineering",         variant: "Base" },
      { href: "../templates/data-science/sample.html",                major: "Data Science",              variant: "Base" },
      { href: "../templates/data-science-b/sample.html",              major: "Data Science",              variant: "B"    },
      { href: "../templates/early-childhood-education/sample.html",   major: "Early Childhood Education", variant: "Base" },
      { href: "../templates/electrical-engineering/sample.html",      major: "Electrical Engineering",    variant: "Base" },
      { href: "../templates/electrical-engineering-b/sample.html",    major: "Electrical Engineering",    variant: "B"    },
      { href: "../templates/finance/sample.html",                     major: "Finance",                   variant: "Base" },
      { href: "../templates/history/sample.html",                     major: "History",                   variant: "Base" },
      { href: "../templates/linguistics/sample.html",                 major: "Linguistics",               variant: "Base" },
      { href: "../templates/management/sample.html",                  major: "Management",                variant: "Base" },
      { href: "../templates/physics/sample.html",                     major: "Physics",                   variant: "Base" },
      { href: "../templates/psychology/sample.html",                  major: "Psychology",                variant: "Base" },
      { href: "../templates/spanish/sample.html",                     major: "Spanish",                   variant: "Base" },
      { href: "../templates/spanish-b/sample.html",                   major: "Spanish",                   variant: "B"    },
      { href: "../templates/statistics/sample.html",                  major: "Statistics",                variant: "Base" },
    ];

    const gallery = document.getElementById("gallery");
    const searchInput = document.getElementById("searchInput");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");
    const learnMoreModal = document.getElementById("learnMoreModal");
    const learnMoreTitle = document.getElementById("learnMoreTitle");
    const learnMoreBody = document.getElementById("learnMoreBody");
    const learnMoreClose = document.getElementById("learnMoreClose");
    const learnMoreOpenLink = document.getElementById("learnMoreOpenLink");

    const blurbCache = new Map();
    let lastFocusedElement = null;

    function enrichEntry(entry) {
      return { ...entry, searchText: [entry.major, entry.variant, entry.href].join(" ").toLowerCase() };
    }

    function templateTitle(entry) {
      return entry.variant === "Base" ? entry.major : `${entry.major} ${entry.variant}`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function learnMoreHtml(markdownText) {
      const paragraphs = String(markdownText || "")
        .split(/\n{2,}/)
        .map((paragraph) => paragraph.trim())
        .filter(Boolean);

      return paragraphs
        .map((paragraph) => `<p>${escapeHtml(paragraph).replace(/\n/g, "<br>")}</p>`)
        .join("");
    }

    function blurbHref(entry) {
      return entry.href.replace(/sample\.html$/, "blurb.txt");
    }

    function loadBlurb(entry) {
      const href = blurbHref(entry);
      if (!blurbCache.has(href)) {
        blurbCache.set(href, fetch(href, { cache: "no-cache" })
          .then((response) => {
            if (!response.ok) {
              throw new Error(`${href} returned ${response.status}`);
            }
            return response.text();
          }));
      }
      return blurbCache.get(href);
    }

    async function openLearnMore(entry, triggerElement) {
      lastFocusedElement = triggerElement || document.activeElement;
      learnMoreTitle.textContent = templateTitle(entry);
      learnMoreBody.innerHTML = "<p>Loading details...</p>";
      learnMoreOpenLink.href = entry.href;
      learnMoreModal.hidden = false;
      document.body.classList.add("modal-open");
      learnMoreClose.focus();

      try {
        const blurb = await loadBlurb(entry);
        learnMoreBody.innerHTML = learnMoreHtml(blurb || "Details for this template are not available yet.");
      } catch (error) {
        learnMoreBody.innerHTML = "<p>Learn More details could not be loaded.</p>";
      }
    }

    function closeLearnMore() {
      learnMoreModal.hidden = true;
      document.body.classList.remove("modal-open");
      if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
        lastFocusedElement.focus();
      }
    }

    function createCard(entry) {
      const card = document.createElement("article");
      card.className = "card";
      card.dataset.search = entry.searchText;

      card.innerHTML = `
        <a class="preview-link" href="${entry.href}" target="_blank" rel="noopener noreferrer" aria-label="Open ${templateTitle(entry)} website">
          <div class="preview-shell" aria-hidden="true">
            <div class="preview-stage">
              <iframe
                class="preview-frame"
                src="${entry.href}"
                title="${templateTitle(entry)} preview"
                loading="lazy"
                tabindex="-1"
              ></iframe>
            </div>
          </div>
        </a>
        <div class="card-body">
          <h2>${templateTitle(entry)}</h2>
          <button class="cta" type="button" aria-label="Learn more about ${templateTitle(entry)}">Learn More</button>
        </div>
      `;

      card.querySelector(".cta").addEventListener("click", (event) => {
        openLearnMore(entry, event.currentTarget);
      });

      return card;
    }

    function renderGallery() {
      const entries = files.map(enrichEntry);
      const fragment = document.createDocumentFragment();

      entries.forEach((entry) => {
        fragment.appendChild(createCard(entry));
      });

      gallery.innerHTML = "";
      gallery.appendChild(fragment);
      updateFilter();
    }

    function updateFilter() {
      const query = searchInput.value.trim().toLowerCase();
      const cards = [...gallery.querySelectorAll(".card")];
      let visibleCount = 0;

      cards.forEach((card) => {
        const matches = !query || card.dataset.search.includes(query);
        card.hidden = !matches;
        if (matches) {
          visibleCount += 1;
        }
      });

      resultCount.textContent = `${visibleCount} of ${cards.length} templates visible`;
      emptyState.classList.toggle("show", visibleCount === 0);
    }

    searchInput.addEventListener("input", updateFilter);
    learnMoreClose.addEventListener("click", closeLearnMore);
    learnMoreModal.addEventListener("click", (event) => {
      if (event.target === learnMoreModal) {
        closeLearnMore();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !learnMoreModal.hidden) {
        closeLearnMore();
      }
    });
    renderGallery();
  </script>
</body>
</html>

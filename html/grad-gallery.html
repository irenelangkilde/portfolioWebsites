<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Portfolio Gallery</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --bg-deep: #16213e;
      --panel: rgba(24, 34, 62, 0.86);
      --panel-strong: #213055;
      --ink: #eef3ff;
      --muted: #aab6d3;
      --line: rgba(255, 255, 255, 0.1);
      --shadow: 0 18px 50px rgba(5, 10, 24, 0.34);
      --shadow-strong: 0 24px 60px rgba(5, 10, 24, 0.5);
      --accent: #8ea2ff;
      --accent-2: #7ed7c1;
      --preview-width: 1440;
      --preview-height: 1024;
      --preview-scale: 0.19;
      --preview-shell-height: calc(var(--preview-height) * 1px * var(--preview-scale));
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(142, 162, 255, 0.16), transparent 34%),
        radial-gradient(circle at top right, rgba(126, 215, 193, 0.14), transparent 28%),
        linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 100%);
      min-height: 100vh;
    }

    a {
      color: inherit;
    }

    .page {
      width: min(1240px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0 56px;
    }

    .hero {
      position: sticky;
      top: 0;
      z-index: 20;
      margin-bottom: 28px;
      padding: 22px 24px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(22, 33, 62, 0.88);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: "Fraunces", Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 4.4rem);
      font-weight: 600;
      line-height: 0.95;
      letter-spacing: -0.04em;
      max-width: 10ch;
    }

    .hero-copy {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: end;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.7;
    }

    .hero-tools {
      display: grid;
      gap: 14px;
      justify-items: stretch;
    }

    .search-wrap {
      display: grid;
      gap: 8px;
    }

    .search-label,
    .count {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
    }

    #searchInput {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      background: rgba(10, 15, 30, 0.46);
      color: var(--ink);
      font: inherit;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    #searchInput:focus {
      border-color: rgba(142, 162, 255, 0.55);
      box-shadow: 0 0 0 4px rgba(142, 162, 255, 0.12);
      transform: translateY(-1px);
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .card {
      position: relative;
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      overflow: hidden;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: auto -10% -35% auto;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(142, 162, 255, 0.18), transparent 70%);
      z-index: -1;
    }

    .card:hover,
    .card:focus-visible {
      transform: translateY(-6px);
      border-color: rgba(142, 162, 255, 0.28);
      box-shadow: var(--shadow-strong);
    }

    .card:focus-visible {
      outline: 3px solid rgba(142, 162, 255, 0.22);
      outline-offset: 2px;
    }

    .preview-shell {
      position: relative;
      height: var(--preview-shell-height);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background:
        linear-gradient(180deg, rgba(126, 215, 193, 0.08), rgba(142, 162, 255, 0.08)),
        var(--panel-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    .preview-shell::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 30px;
      background: linear-gradient(180deg, rgba(142, 162, 255, 0.18), rgba(142, 162, 255, 0.06));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 2;
    }

    .preview-shell::after {
      content: "";
      position: absolute;
      top: 10px;
      left: 12px;
      width: 48px;
      height: 10px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 5px 5px, #d97757 0 4px, transparent 4.1px),
        radial-gradient(circle at 24px 5px, #d7a457 0 4px, transparent 4.1px),
        radial-gradient(circle at 43px 5px, #5e9f86 0 4px, transparent 4.1px);
      z-index: 3;
    }

    .preview-stage {
      position: absolute;
      top: 30px;
      left: 0;
      width: 100%;
      height: calc(100% - 30px);
      overflow: hidden;
      background: #fff;
    }

    .preview-frame {
      width: calc(var(--preview-width) * 1px);
      height: calc(var(--preview-height) * 1px);
      border: 0;
      transform: scale(var(--preview-scale));
      transform-origin: top left;
      pointer-events: none;
      background: #fff;
    }

    .card-body {
      display: grid;
      gap: 10px;
    }

    .card h2 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(142, 162, 255, 0.12);
      color: var(--accent);
      font-size: 0.86rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .empty {
      display: none;
      padding: 40px 24px;
      border: 1px dashed rgba(255, 255, 255, 0.18);
      border-radius: 24px;
      background: rgba(22, 33, 62, 0.6);
      color: var(--muted);
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
    }

    .empty.show {
      display: block;
    }

    @media (max-width: 820px) {
      .page {
        width: min(100vw - 18px, 1240px);
        padding-top: 12px;
      }

      .hero {
        position: static;
        padding: 18px;
        border-radius: 22px;
      }

      .hero-copy {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 520px) {
      :root {
        --preview-scale: 0.16;
      }

      .gallery {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 14px;
        border-radius: 20px;
      }

      .preview-shell {
        border-radius: 16px;
      }

      h1 {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <p class="eyebrow">HTML Template Gallery</p>
      <div class="hero-copy">
        <div>
          <h1>Personal Portfolio Previews</h1>
          <p>
            Browse our public portfolio variants. Each card shows a live scaled preview. Click any preview to open the full
            site in a new tab.
          </p>
        </div>
        <div class="hero-tools">
          <div class="search-wrap">
            <label class="search-label" for="searchInput">Filter by major or variant</label>
            <input id="searchInput" type="search" placeholder="Try biology, biology B, electrical engineering,..." />
          </div>
          <div class="count" id="resultCount" aria-live="polite"></div>
        </div>
      </div>
    </section>

    <section class="gallery" id="gallery" aria-label="Grad website gallery"></section>
    <div class="empty" id="emptyState">No gallery cards match that filter.</div>
  </main>

  <script>
    const files = [
      "accountingGrad.html",
      "anthropologyGrad.html",
      "artGrad.html",
      "biologyGrad.html",
      "biologyGrad_B.html",
      "chemistryGrad.html",
      "civil-engineeringGrad.html",
      "data-scienceGrad.html",
      "data-scienceGrad_B.html",
      "early-childhood-educationGrad.html",
      "electrical-engineeringGrad.html",
      "electrical-engineeringGrad_B.html",
      "financeGrad.html",
      "historyGrad.html",
      "linguisticsGrad.html",
      "managementGrad.html",
      "physicsGrad.html",
      "psychologyGrad.html",
      "spanishGrad.html",
      "spanishGrad_B.html",
      "statisticsGrad.html"
    ];

    const gallery = document.getElementById("gallery");
    const searchInput = document.getElementById("searchInput");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");

    function toTitleCase(text) {
      return text.replace(/\b\w/g, (letter) => letter.toUpperCase());
    }

    function parseFileName(fileName) {
      const withoutExtension = fileName.replace(/\.html$/i, "");
      const baseMatch = withoutExtension.match(/^(.*)Grad(?:_(.*))?$/);
      const rawMajor = baseMatch ? baseMatch[1] : withoutExtension;
      const rawVariant = baseMatch && baseMatch[2] ? baseMatch[2] : "";
      const major = toTitleCase(rawMajor.replace(/-/g, " ").trim());
      const variant = rawVariant ? toTitleCase(rawVariant.replace(/-/g, " ").trim()) : "Base";

      return {
        fileName,
        href: fileName,
        major,
        variant,
        searchText: [major, variant, fileName].join(" ").toLowerCase()
      };
    }

    function createCard(entry) {
      const card = document.createElement("a");
      card.className = "card";
      card.href = entry.href;
      card.target = "_blank";
      card.rel = "noopener noreferrer";
      card.setAttribute("aria-label", `Open ${entry.major} ${entry.variant} website`);
      card.dataset.search = entry.searchText;

      card.innerHTML = `
        <div class="preview-shell" aria-hidden="true">
          <div class="preview-stage">
            <iframe
              class="preview-frame"
              src="${entry.href}"
              title="${entry.major} ${entry.variant} preview"
              loading="lazy"
              tabindex="-1"
            ></iframe>
          </div>
        </div>
        <div class="card-body">
          <h2>${entry.major}</h2>
          <span class="cta">Open Full Website</span>
        </div>
      `;

      return card;
    }

    function renderGallery() {
      const entries = files.map(parseFileName);
      const fragment = document.createDocumentFragment();

      entries.forEach((entry) => {
        fragment.appendChild(createCard(entry));
      });

      gallery.innerHTML = "";
      gallery.appendChild(fragment);
      updateFilter();
    }

    function updateFilter() {
      const query = searchInput.value.trim().toLowerCase();
      const cards = [...gallery.querySelectorAll(".card")];
      let visibleCount = 0;

      cards.forEach((card) => {
        const matches = !query || card.dataset.search.includes(query);
        card.hidden = !matches;
        if (matches) {
          visibleCount += 1;
        }
      });

      resultCount.textContent = `${visibleCount} of ${cards.length} templates visible`;
      emptyState.classList.toggle("show", visibleCount === 0);
    }

    searchInput.addEventListener("input", updateFilter);
    renderGallery();
  </script>
</body>
</html>
